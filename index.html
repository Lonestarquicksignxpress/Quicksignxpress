
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lone Star Quicksign Xpress Notary</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b1c3a; /* Deep blue from business card design */
            --gold: #d6af53;    /* Metallic gold tone matching the badge */
            --gold-hover: #f2cb73;
            --text-light: #ffffff;
            --text-muted: #abb8c9;
            --card-bg: rgba(15, 37, 75, 0.75); /* Translucent blue card structure */
            --border-gold: rgba(214, 175, 83, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* WATERMARK BACKGROUND EFFECT */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vmin;
            height: 85vmin;
            background-image: url('star_logo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.05; /* Subtly embedded into the backdrop as requested */
            pointer-events: none;
            z-index: -1;
        }

        /* NAVIGATION BAR OVERHAUL */
        header {
            border-bottom: 2px solid var(--gold);
            background-color: rgba(11, 28, 58, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .nav-menu {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: var(--gold);
        }

        /* MAIN HERO WRAPPER */
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .hero h1 img {
            height: 65px;
            width: auto;
        }

        .hero-subtitle {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 50px;
            font-weight: 600;
        }

        /* INTERACTIVE BUTTONS WITH REAL SVG BRAND ICONS */
        .hero-ctas {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 14px 30px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            background-color: var(--card-bg);
            border: 1px solid var(--gold);
            color: var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cta-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .cta-btn:hover {
            background-color: var(--gold);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(214, 175, 83, 0.4);
        }

        /* VERTICAL FEATURES OVERVIEW STYLING MATCHING REFERENCED SCREENSHOT */
        .features-section {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .features-section h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 35px;
            letter-spacing: 1.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .features-section h2 img {
            height: 50px;
            width: auto;
        }

        .features-column-layout {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-top: 1px solid rgba(214, 175, 83, 0.3);
            border-bottom: 1px solid rgba(214, 175, 83, 0.3);
        }

        .feature-item-row {
            padding: 28px 20px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid rgba(214, 175, 83, 0.2);
        }

        .feature-item-row:last-child {
            border-bottom: none;
        }

        /* TWO-COLUMN ACCORDION COMPONENT WITH CLEAN DESCRIPTIONS */
        .services-section {
            max-width: 1100px;
            margin: 0 auto 60px;
            padding: 50px 20px 60px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .services-section h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 45px;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        .services-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .services-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        details {
            background-color: var(--card-bg);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        details[open] {
            border-color: var(--gold);
            background-color: rgba(18, 44, 88, 0.9);
        }

        summary {
            padding: 18px 22px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.05rem;
            user-select: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '+';
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: 400;
            transition: transform 0.3s;
        }

        details[open] summary::after {
            content: '−';
        }

        .details-content {
            padding: 0 22px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            border-top: 1px solid rgba(214, 175, 83, 0.1);
            padding-top: 15px;
        }

        /* REGIONAL DISPATCH STRIP */
        .regions-strip {
            background-color: rgba(5, 14, 31, 0.8);
            border-top: 1px solid var(--border-gold);
            border-bottom: 1px solid var(--border-gold);
            padding: 15px 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            max-width: 1100px;
            margin: 0 auto 50px;
            border-radius: 4px;
        }

        .regions-strip strong {
            color: var(--gold);
        }

        /* STATE COMPLIANCE FOOTER & MANDATORY SOS ATTORNEY DISCLAIMER */
        footer {
            background-color: #050e1f;
            border-top: 2px solid var(--gold);
            padding: 30px 20px;
            text-align: center;
        }

        .sos-disclaimer {
            max-width: 800px;
            margin: 0 auto;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        .sos-disclaimer strong {
            color: var(--gold);
            display: block;
            margin-bottom: 5px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        /* DESIGN BREAKPOINTS FOR RESPONSIVENESS */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 2.6rem; }
            .services-columns { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .nav-menu { gap: 25px; }
            .hero h1 { font-size: 2rem; }
            .features-section h2 { font-size: 1.6rem; }
            .feature-item-row { font-size: 1.1rem; padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-area">
                <img src="star_logo.png" alt="Logo" class="logo-img">
                LONE STAR QUICKSIGN XPRESS NOTARY
            </div>
            <ul class="nav-menu">
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </header>

            <img src="star_logo.png" alt="Star Logo Badge">
            LONE STAR QUICKSIGN XPRESS NOTARY
        </h1>
        <p class="hero-subtitle">AUTHORIZED IN TEXAS · SERVING CLIENTS WORLDWIDE</p>

            <a href="sms:+19152581693" class="cta-btn">
