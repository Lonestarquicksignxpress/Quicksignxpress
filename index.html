/* WATERMARK BACKGROUND EFFECT */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url('star_logo.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: 65vmin;
    opacity: 0.05;
    pointer-events: none;
    z-index: -1;
    filter: grayscale(20%);
}
