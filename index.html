<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lone Star QuickSign Xpress Notary Directory</title>
    <style>
        :root {
            --bg-dark: #0b1526;
            --card-bg: #122240;
            --gold: #d4af37;
            --text-main: #ffffff;
            --text-sub: #9fb1cc;
            --border-color: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .directory-container {
            background-color: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
        }

        .logo-star {
            color: var(--gold);
            font-size: 2rem;
        }

        .title-area h1 {
            color: var(--text-main);
            font-size: 1.25rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .title-area p {
            color: var(--gold);
            font-size: 0.75rem;
            margin: 5px 0 0 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Communication & Info Action Links */
        .action-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, background 0.2s ease;
        }
